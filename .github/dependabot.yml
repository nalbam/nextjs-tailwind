version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      better-auth:
        patterns:
          - "better-auth"
          - "@better-auth/*"
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      types:
        patterns:
          - "@types/*"
      tooling:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "eslint"
          - "prettier"
          - "husky"
          - "lint-staged"
          - "tsx"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
